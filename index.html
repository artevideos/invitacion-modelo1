<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invitación Premium</title>

<!-- 🔤 FUENTES (puedes cambiar aquí o agregar más) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* ==================================================
   💼 CONFIGURACIÓN GLOBAL (NO TOCAR AQUÍ ABAJO)
   ================================================== */
:root {
  --primary: #d4af37;
  --bg: #000;
  --text: #fff;

  --title-font: 'Playfair Display', serif;
  --body-font: 'Montserrat', sans-serif;

  --title-size: 3rem;
  --text-size: 1rem;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  overflow-x:hidden;
}

/* =========================
   🎬 BACKGROUND (VIDEO / IMG)
   ========================= */
.background {
  position:fixed;
  inset:0;
  z-index:-1;
  overflow:hidden;
}

.background video,
.background img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.55);
}

/* =========================
   HERO
   ========================= */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero-content {
  z-index:2;
}

h1 {
  font-family: var(--title-font);
  font-size: var(--title-size);
}

p {
  font-size: var(--text-size);
  opacity:0.9;
  margin-top:10px;
}

/* BOTONES */
.btn {
  margin-top:18px;
  padding:12px 22px;
  background: var(--primary);
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

/* SECCIONES */
section {
  padding:60px 20px;
  text-align:center;
}

.box {
  max-width:850px;
  margin:auto;
  background:#151515;
  padding:25px;
  border-radius:15px;
  margin-bottom:25px;
}

/* COUNTDOWN PRO */
.countdown {
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.time {
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  min-width:80px;
}

.time span {
  display:block;
  font-size:1.6rem;
  color:var(--primary);
  font-weight:bold;
}

/* CARRUSEL */
.carousel {
  overflow:hidden;
  border-radius:15px;
}

.slides {
  display:flex;
  animation: slide 12s infinite;
}

.slides img {
  width:100%;
  height:350px;
  object-fit:cover;
}

@keyframes slide {
  0% {transform:translateX(0);}
  33% {transform:translateX(-100%);}
  66% {transform:translateX(-200%);}
  100% {transform:translateX(0);}
}

/* LINKS */
a.button {
  display:inline-block;
  margin-top:15px;
  padding:12px 20px;
  background:var(--primary);
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- ==================================================
     🎬 BACKGROUND (EDITABLE: VIDEO O IMAGEN)
     ================================================== -->
<div class="background">

  <!-- OPCIÓN 1: VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="fondo.mp4">
  </video>

  <!-- OPCIÓN 2: IMAGEN (si quieres usar imagen, BORRAS el video y dejas esto)
  <img src="fondo.jpg">
  -->

  <div class="overlay"></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Mis 15 Años</h1>
    <p>Una noche inolvidable</p>

    <button class="btn" onclick="scrollToSection()">Ver invitación</button>

    <button class="btn" onclick="toggleMusic()">🎵 Música</button>

    <audio id="music">
      <source src="musica.mp3">
    </audio>
  </div>
</div>

<!-- CONTENIDO -->
<section id="info">

<!-- COUNTDOWN -->
<div class="box">
  <h2>⏳ Cuenta regresiva</h2>

  <div class="countdown">
    <div class="time"><span id="d">0</span>Días</div>
    <div class="time"><span id="h">0</span>Horas</div>
    <div class="time"><span id="m">0</span>Min</div>
    <div class="time"><span id="s">0</span>Seg</div>
  </div>
</div>

<!-- UBICACIÓN -->
<div class="box">
  <h2>📍 Ubicación</h2>
  <a class="button" id="mapLink" target="_blank">Ver ubicación</a>
</div>

<!-- WHATSAPP -->
<div class="box">
  <h2>💬 Confirmación</h2>
  <a class="button" id="waLink" target="_blank">Confirmar por WhatsApp</a>
</div>

<!-- GALERÍA -->
<div class="box">
  <h2>📸 Galería</h2>

  <div class="carousel">
    <div class="slides">
      <img src="foto1.png">
      <img src="foto2.jpg">
      <img src="principal.jpg">
    </div>
  </div>
</div>

</section>

<script>
/* ==================================================
   ⚙️ CONFIG CENTRAL (EDITAR SOLO AQUÍ)
   ================================================== */
const CONFIG = {

  eventDate: "2026-12-20T20:00:00",

  whatsapp: "59899999999",

  whatsappText: "Hola! Confirmo mi asistencia a los 15 años",

  mapURL: "https://www.google.com/maps",

};

/* =========================
   LINKS DINÁMICOS
   ========================= */
document.getElementById("waLink").href =
  `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(CONFIG.whatsappText)}`;

document.getElementById("mapLink").href = CONFIG.mapURL;

/* =========================
   COUNTDOWN
   ========================= */
const event = new Date(CONFIG.eventDate).getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = event - now;

  document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerText = Math.floor((diff/(1000*60*60))%24);
  document.getElementById("m").innerText = Math.floor((diff/(1000*60))%60);
  document.getElementById("s").innerText = Math.floor((diff/1000)%60);

}, 1000);

/* =========================
   FUNCIONES
   ========================= */
function scrollToSection(){
  document.getElementById("info").scrollIntoView({behavior:"smooth"});
}

function toggleMusic(){
  const music = document.getElementById("music");
  music.paused ? music.play() : music.pause();
}
</script>

</body>
</html>
